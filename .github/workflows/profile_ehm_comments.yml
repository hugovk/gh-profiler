# Troubleshooting workflow to profile me on every comment I make, to sort out workflow
# that profiles the author of each new issue and PR.

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  reply:
    if: ${{ github.event.comment.user.login == 'ehmatthes' }}
    runs-on: ubuntu-latest
    steps:
      - name: Reply to comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="Debug reply: I saw your comment: ${{ github.event.comment.body }}"